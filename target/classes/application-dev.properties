# ==========================================
# viclean Backend Configuration - Development Profile  
# ==========================================

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Usar H2 Database con FILE (persistencia en archivo local)
spring.datasource.url=jdbc:h2:./data/viclean
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway opcional en dev (desactivado por defecto)
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# JWT Configuration (dev fallback; usa JWT_SECRET si está definido)
jwt.secret=${JWT_SECRET:dev-change-me}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Mail Configuration (for development - console output)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=

# Logging
logging.level.com.cleanhome.backend=DEBUG
logging.level.org.springframework.security=INFO

# Allowed CORS origins para dev (web + mobile)
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:8080,http://127.0.0.1:8080,http://10.0.2.2:8080}

# Wompi Configuration (dev - valores de prueba)
wompi.public-key=${WOMPI_PUBLIC_KEY:pub_test_0000000000000000000000000000}
wompi.private-key=${WOMPI_PRIVATE_KEY:prv_test_0000000000000000000000000000}
wompi.base-url=${WOMPI_BASE_URL:https://api-sandbox.co.uat.wompi.dev/v1}
wompi.events-secret=${WOMPI_EVENTS_SECRET:dev_test_secret}

# AI config (dev)
ai.enabled=${AI_ENABLED:true}
ai.model=${AI_MODEL:gpt-5.1-codex-max}
ai.rate-limit.enabled=${AI_RATE_LIMIT_ENABLED:true}
ai.rate-limit.max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:30}
ai.rate-limit.window-seconds=${AI_RATE_LIMIT_WINDOW_SECONDS:60}