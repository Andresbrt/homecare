# ==========================================
# CleanHome Backend Configuration
# ==========================================

# Default Profile
spring.profiles.active=dev

# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration (Production - use environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}

# JPA/Hibernate Configuration
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT Configuration (REQUIRED in prod)
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# API Documentation
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Mail Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging (avoid DEBUG for security in production)
logging.level.com.cleanhome.backend=INFO
logging.level.org.springframework.security=INFO

# Multipart file upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Wompi Configuration (set via secrets)
wompi.public-key=${WOMPI_PUBLIC_KEY}
wompi.private-key=${WOMPI_PRIVATE_KEY}
wompi.events-secret=${WOMPI_EVENTS_SECRET}
wompi.api-base=${WOMPI_API_BASE:https://sandbox.wompi.co/v1}

# Allowed CORS origins (comma-separated). Example: https://app.cleanhome.com,https://admin.cleanhome.com
app.cors.allowed-origins=${ALLOWED_ORIGINS:}

# AI runtime config
ai.enabled=${AI_ENABLED:true}
ai.model=${AI_MODEL:gpt-5.1-codex-max}
ai.rate-limit.enabled=${AI_RATE_LIMIT_ENABLED:false}
ai.rate-limit.max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:20}
ai.rate-limit.window-seconds=${AI_RATE_LIMIT_WINDOW_SECONDS:60}