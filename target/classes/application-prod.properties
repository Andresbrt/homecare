# ============================================
# CleanHome - Perfil Producción (PostgreSQL)
# ============================================

# Servidor
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/api
spring.application.name=cleanhome-backend

# Base de Datos PostgreSQL (usar secretos / variables de entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Pool Hikari (ajusta según el tamaño de instancia)
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:30}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:10}
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=900000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.pool-name=cleanhome-hikari

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

# CORS (define dominios permitidos separados por coma)
app.cors.allowed-origins=${ALLOWED_ORIGINS}

# Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Flyway
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Logging
logging.level.root=INFO
logging.level.com.cleanhome.backend=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when_authorized
management.endpoint.health.roles=ADMIN

# AI
ai.enabled=${AI_ENABLED:true}
ai.model=${AI_MODEL:gpt-5.1-codex-max}
ai.rate-limit.enabled=${AI_RATE_LIMIT_ENABLED:true}
ai.rate-limit.max-requests=${AI_RATE_LIMIT_MAX_REQUESTS:60}
ai.rate-limit.window-seconds=${AI_RATE_LIMIT_WINDOW_SECONDS:60}

