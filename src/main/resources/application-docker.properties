# ============================================
# viclean - Configuración Docker
# ============================================

# Servidor
server.port=8080
spring.application.name=viclean-backend

# Base de Datos PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://database:5432/viclean}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:viclean_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:viclean_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:your-secret-key-change-in-production}
jwt.expiration=86400000

# Logging
logging.level.root=INFO
logging.level.com.cleanhome.backend=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# CORS (permitir todos los orígenes en desarrollo)
cors.allowed.origins=*

# Actuator (health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# AI (Docker overrides via env)
ai.enabled=${AI_ENABLED:true}
ai.model=${AI_MODEL:gpt-5.1-codex-max}
